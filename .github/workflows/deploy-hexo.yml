name: Pages

on:
  push:
    branches:
      - master  # default branch

jobs:
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # If your repository depends on submodule, please see: https://github.com/actions/checkout
          submodules: recursive
      - name: Use Node.js 19.x
        uses: actions/setup-node@v2
        with:
          node-version: '19'
      - name: Cache NPM dependencies
        uses: actions/cache@v2
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache
      - name: Install Dependencies
        run: npm install
      - name: unInstall markdown-it
        run: npm un hexo-renderer-marked --save
      - name: Install markdown-it
        run: npm i hexo-renderer-multi-markdown-it --save
      - name: Install autoprefixer
        run: npm i hexo-autoprefixer --save
      - name: Install algoliasearch
        run: npm i hexo-algoliasearch --save
      - name: Install count-time
        run: npm i hexo-symbols-count-time --save
      - name: Install feed
        run: npm i hexo-feed --save
      - name: hexoclean
        run: hexo clean
      - name: Build
        run: npm run build
      - name: Install feed
        run: hexo algolia
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public